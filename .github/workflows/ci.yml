name: CI — Governance Artifact Consistency

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate governance artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required agents exist
        run: |
          required_agents=(
            ".github/agents/orchestrator.lifecycle.agent.md"
            ".github/agents/speckit.specify.agent.md"
            ".github/agents/speckit.plan.agent.md"
            ".github/agents/speckit.tasks.agent.md"
            ".github/agents/speckit.implement.agent.md"
            ".github/agents/speckit.constitution.agent.md"
            ".github/agents/speckit.checklist.agent.md"
            ".github/agents/speckit.analyze.agent.md"
            ".github/agents/speckit.clarify.agent.md"
            ".github/agents/speckit.git.commit.agent.md"
            ".github/agents/speckit.git.feature.agent.md"
            ".github/agents/speckit.git.initialize.agent.md"
            ".github/agents/speckit.git.remote.agent.md"
            ".github/agents/speckit.git.validate.agent.md"
            ".github/agents/speckit.taskstoissues.agent.md"
          )
          missing=0
          for f in "${required_agents[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING agent: $f"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] && echo "All required agents present." || exit 1

      - name: Check required templates exist
        run: |
          required_templates=(
            ".specify/templates/spec-template.md"
            ".specify/templates/plan-template.md"
            ".specify/templates/tasks-template.md"
            ".specify/templates/checklist-template.md"
            ".specify/templates/constitution-template.md"
          )
          missing=0
          for f in "${required_templates[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING template: $f"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] && echo "All required templates present." || exit 1

      - name: Check required scripts exist and are executable-capable
        run: |
          required_scripts=(
            ".specify/scripts/bash/check-prerequisites.sh"
            ".specify/scripts/bash/common.sh"
            ".specify/scripts/bash/preflight-constitution-sync.sh"
            ".specify/scripts/bash/create-new-feature.sh"
            ".specify/scripts/bash/setup-plan.sh"
            ".specify/scripts/bash/setup-tasks.sh"
          )
          missing=0
          for f in "${required_scripts[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING script: $f"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] && echo "All required scripts present." || exit 1

      - name: Check VERSION file
        run: |
          if [[ ! -f "VERSION" ]]; then
            echo "MISSING: VERSION file"
            exit 1
          fi
          version=$(cat VERSION)
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "INVALID version format in VERSION: $version (expected semver x.y.z)"
            exit 1
          fi
          echo "VERSION: $version — valid semver."

      - name: Check orchestrator contains required workflow markers
        run: |
          orchestrator=".github/agents/orchestrator.lifecycle.agent.md"
          required_markers=(
            "feature/<slug>/staging"
            "feature/<slug>/task-<task-id>-<short-name>"
            "Every PR requires user approval before merge."
          )
          missing=0
          for marker in "${required_markers[@]}"; do
            if ! grep -Fq "$marker" "$orchestrator"; then
              echo "MISSING orchestrator marker: $marker"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] && echo "Orchestrator workflow markers OK." || exit 1

      - name: Check bootstrap scripts exist
        run: |
          required_bootstrap=(
            "bootstrap/init-project.sh"
            "bootstrap/sync-governance.sh"
          )
          missing=0
          for f in "${required_bootstrap[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING bootstrap script: $f"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] && echo "Bootstrap scripts present." || exit 1

      - name: Validate constitution template has required sections
        run: |
          tmpl=".specify/templates/constitution-template.md"
          required_sections=(
            "Spec-First"
            "Security"
            "Feature integration branch"
            "Task branches"
            "Quality Gates"
          )
          missing=0
          for section in "${required_sections[@]}"; do
            if ! grep -qi "$section" "$tmpl"; then
              echo "MISSING section in constitution-template: $section"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]] && echo "Constitution template sections OK." || exit 1

      - name: All governance artifact checks passed
        run: echo "✅ Governance artifact consistency validated."
